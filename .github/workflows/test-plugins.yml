name: Test Plugins

on:
  push:
    paths:
      - "plugins/**"
      - "scripts/smoke-test-hooks.py"
      - ".github/workflows/test-plugins.yml"
  pull_request:
    paths:
      - "plugins/**"
      - "scripts/smoke-test-hooks.py"
      - ".github/workflows/test-plugins.yml"

jobs:
  pytest:
    name: pytest (unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run unit tests
        run: |
          test_files=$(find plugins -name "test_*.py" -print)
          if [ -n "$test_files" ]; then
            python -m pytest $test_files -v --tb=short
          else
            echo "No test files found, skipping"
          fi

  smoke-test:
    name: Hook smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          pip install pyyaml
      - name: Run hook smoke tests
        run: python scripts/smoke-test-hooks.py --verbose
